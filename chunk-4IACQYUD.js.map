<section class="contacto-section">
  <div class="container">
    <h1>{{ "location.title" | translate }}</h1>

    <div class="contacto-grid">
      <!-- Tarjeta de información -->
      <div class="info-card">
        <h4>{{ "location.name" | translate }}</h4>
        <p>{{ "location.body" | translate }}</p>

        <div class="contact-actions">
          <a
            target="_blank"
            href="https://wa.me/573102228738"
            class="btn-whatsapp"
            aria-label="Contactar por WhatsApp"
          >
            <img src="assets/img/wpp.png" alt="" width="24" />
            {{ "contact.phone" | translate }}
          </a>

          <a
            target="_blank"
            href="https://www.google.com/maps/dir//Av+malpaso+km+3,+Anillo+Vial,+Gir%C3%B3n,+Santander/@7.0679257,-73.2332092,12z"
            class="btn-directions"
          >
            📍 {{ "location.click" | translate }}
          </a>
        </div>

        <div class="contact-details">
          <p><strong>📧</strong> {{ "contact.email" | translate }}</p>
          <p><strong>📍</strong> {{ "contact.address" | translate }}</p>
        </div>

        <p class="social-label">{{ "location.socialMedia" | translate }}</p>
        <div class="social-row">
          <a target="_blank" href="https://www.facebook.com/InduserviceFL/" aria-label="Facebook">
            <img src="assets/img/facebook.png" alt="Facebook" />
          </a>
          <a target="_blank" href="https://www.instagram.com/induservice.fl/" aria-label="Instagram">
            <img src="assets/img/instagram.png" alt="Instagram" />
          </a>
          <a target="_blank" href="https://wa.me/573102228738" aria-label="WhatsApp">
            <img src="assets/img/wpp.png" alt="WhatsApp" />
          </a>
        </div>
      </div>

      <!-- Mapa -->
      <div class="map-card">
        <iframe
          title="Ubicación Induservice FL en Google Maps"
          src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d15837.998114212356!2d-73.1508073!3d7.0679329!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e683fe259f1840d%3A0x9eba2827925c5d81!2sInduservice%20F.L!5e0!3m2!1ses-419!2sco!4v1719618008172!5m2!1ses-419!2sco"
          width="100%"
          height="100%"
          style="border: 0; min-height: 350px;"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </div>
  </div>
</section>
