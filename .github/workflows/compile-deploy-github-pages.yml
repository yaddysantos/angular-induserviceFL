name: Compile and Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: 20
  APP_NAME: angular-induservice-fl

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular App
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          npm run build -- --configuration=production --base-href="/${REPO_NAME}/"

      - name: Prevent Jekyll processing
        run: touch dist/${{ env.APP_NAME }}/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/${{ env.APP_NAME }}
          clean: true